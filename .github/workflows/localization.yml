name: Localization

on: [pull_request]

jobs:
  hardcoded-ui-strings:
    name: Check Hardcoded UI Strings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify no hardcoded UI strings
        run: ./gradlew verifyNoHardcodedUiStrings

  protected-localization-files:
    name: Check Protected Localization Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check protected localization file edits
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          chmod +x scripts/check-protected-localization-files.sh
          ./scripts/check-protected-localization-files.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "$PR_AUTHOR"
